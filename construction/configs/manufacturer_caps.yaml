# SemiHS-Bench — Per-manufacturer record caps
#
# Caps the number of benchmark records contributed by any single manufacturer.
# Enforced during release packaging by the manufacturer gate in
# scripts/build_release.py.
#
# Rationale: prevent the benchmark from being dominated by any one vendor's
# product family. Top-tier IC vendors (TI, ST, Microchip, NXP, Infineon) have
# the broadest semiconductor catalogs and would otherwise consume 30%+ of
# slots each.
#
# Floor: ≥100 distinct manufacturers in the final release; top-50 each ≥5
# records (per-manufacturer caps rule).

hs_version: HS2022

# Per-tier caps. Manufacturer names should match the canonical form used
# in the candidate pools.
tiers:
  top_5_ic:
    cap: 60
    members:
      - "Texas Instruments"
      - "STMicroelectronics"
      - "Microchip Technology"
      - "NXP Semiconductors"
      - "Infineon Technologies"

